<!-- Add after the rate-card div in settings page -->
      
      <!-- Account Switching -->
      <div class="card settings-section">
        <div class="card-label">Account Management</div>
        <div class="account-switch-row">
          <div class="current-account-info">
            <span class="current-label">Current Account:</span>
            <span class="current-account-email" id="current-account-email">-</span>
          </div>
          <button class="pill-btn outline" onclick="switchAccount()">
            🔄 Switch Account
          </button>
          <button class="pill-btn outline" onclick="logoutAndSwitch()">
            👤 Login as Different User
          </button>
        </div>
      </div>

      <!-- Desktop App Settings -->
      <div class="card settings-section" id="desktop-settings" style="display:none">
        <div class="card-label">Desktop Application</div>
        <div class="sys-row">
          <span class="key">📁 Download Folder</span>
          <div class="path-selector">
            <span class="val" id="desktop-download-path">-</span>
            <button class="pill-btn mini" onclick="changeDownloadFolder()">Change</button>
          </div>
        </div>
        <div class="sys-row">
          <span class="key">🎨 Theme</span>
          <select id="theme-selector" onchange="changeTheme()">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="system">System Default</option>
          </select>
        </div>
        <div class="sys-row">
          <span class="key">💾 Remember Settings</span>
          <label class="switch">
            <input type="checkbox" id="remember-settings" onchange="toggleRememberSettings()">
            <span class="slider"></span>
          </label>
        </div>
        <div class="sys-row">
          <span class="key">🔄 Auto-check Updates</span>
          <label class="switch">
            <input type="checkbox" id="auto-update" onchange="toggleAutoUpdate()">
            <span class="slider"></span>
          </label>
        </div>
        <div class="sys-row">
          <span class="key">📦 App Version</span>
          <span class="val" id="app-version">-</span>
          <button class="pill-btn mini" onclick="checkAppUpdate()">Check Update</button>
        </div>
      </div>

      <!-- Info Hub Button -->
      <div class="info-hub">
        <button class="info-button" id="info-button" onclick="showInfoModal()">
          ℹ️ About & Info
        </button>
      </div>
